<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שגיאה 404 - הדף לא נמצא | ד"ר צ. שובר</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="icon" href="favicon.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2280%22 x=%2250%22 text-anchor=%22middle%22 font-size=%2290%22 font-family=%22serif%22 font-weight=%22bold%22 fill=%22%23d4af37%22>T</text></svg>" type="image/svg+xml">

    <link rel="stylesheet" href="style.css">
    <style>
        .error-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            text-align: center;
            padding: 20px;
        }
        .error-section h1 {
            font-size: 6rem;
            color: var(--gold, #d4af37);
            margin-bottom: 10px;
        }
        .error-section h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #333;
        }
        .error-section p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 40px;
            max-width: 600px;
        }
        .back-home-btn {
            display: inline-block;
            background-color: var(--gold, #d4af37);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: opacity 0.3s ease;
        }
        .back-home-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <main>
        <section class="error-section">
            <h1>404</h1>
            <h2>אופס! הדף שחיפשת לא נמצא</h2>
            <p>ייתכן שהדף הוסר, שמו שונה, או שהוא אינו זמין זמנית. אל דאגה, תוכלו לחזור לעמוד הבית ולהמשיך לגלוש משם.</p>
            <a href="index.html" class="back-home-btn"><i class="fa-solid fa-house"></i> חזרה לעמוד הבית</a>
        </section>
    </main>

    <footer style="background:#050c18; color:#777; padding:20px; text-align:center; position: fixed; bottom: 0; width: 100%;">
        <p>© 2026 תותבות עד הבית | שיקום שיניים מקצועי בבית הלקוח</p>
        <p style="margin: 10px 0 0 0; font-size: 0.9rem; color: #555;">פותח ע"י AS פיתוח וקידום אתרים</p>
    </footer>
</body>
</html>
